<div class="le-rich le-card le-provider-{{.Provider}}">
  <h3>{{.Title}}</h3>
  {{if .Description}}<p class="le-description">{{.Description}}</p>{{end}}
  <div class="le-meta">
    {{if .AuthorName}}<span class="le-author-link"><a href="{{.AuthorURL}}">{{.AuthorName}}</a></span>{{end}}
    <span class="le-goto-link"><a href="{{.URL}}"><span>{{.URL}}</span></a></span>
  </div>
</div>
